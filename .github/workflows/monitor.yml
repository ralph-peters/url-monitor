name: URL Monitor

on:
  schedule:
    # Runs every hour — adjust cron as needed
    # Examples: every 30 min: '*/30 * * * *', every 6h: '0 */6 * * *'
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  check-urls:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up PHP extensions
        run: |
          sudo apt-get update -q
          sudo apt-get install -y php-cli php-mbstring php-curl php-xml composer
          php --version
          composer --version
          php -m | grep -E "mbstring|curl|dom|xml|json"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: ./vendor/bin/phpunit --testdox --display-warnings

      - name: Check URLs for changes
        run: |
          echo "--- Checking: https://www.shopware.com/nl/changelog/ ---"
          php monitor.php "https://www.shopware.com/nl/changelog/"

          echo ""
          echo "--- Checking: https://store.shopware.com/en/swag136939272659f/shopware-6-security-plugin.html ---"
          php monitor.php "https://store.shopware.com/en/swag136939272659f/shopware-6-security-plugin.html"

      - name: Commit updated hashes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cache/
          git diff --staged --quiet || git commit -m "chore: update URL hashes"
          git push
