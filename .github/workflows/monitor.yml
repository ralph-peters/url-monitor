name: URL Monitor

on:
  schedule:
    # Runs every hour — adjust cron as needed
    # Examples: every 30 min: '*/30 * * * *', every 6h: '0 */6 * * *'
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  check-urls:
    runs-on: ubuntu-latest

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check URLs for changes
        run: |
          python3 monitor.py \
            "https://nos.nl/" \
            "https://www.shopware.com/nl/changelog/" \
            "https://store.shopware.com/en/swag136939272659f/shopware-6-security-plugin.html"

      - name: Commit updated hashes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cache/
          git diff --staged --quiet || git commit -m "chore: update URL hashes"
          git push