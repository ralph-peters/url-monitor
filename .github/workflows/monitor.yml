name: URL Monitor

on:
  schedule:
    # Runs every hour — adjust cron as needed
    # Examples: every 30 min: '*/30 * * * *', every 6h: '0 */6 * * *'
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  check-urls:
    runs-on: ubuntu-latest

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, curl, dom, json
          coverage: none

      - name: Show PHP version and extensions
        run: |
          php --version
          php -m

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --verbose

      - name: Run tests
        run: ./vendor/bin/phpunit --testdox --display-warnings

      - name: Check URLs for changes
        run: |
          echo "--- Checking: https://nos.nl/ ---"
          php monitor.php "https://nos.nl/"

          echo ""
          echo "--- Checking: https://www.shopware.com/nl/changelog/ ---"
          php monitor.php "https://www.shopware.com/nl/changelog/"

          echo ""
          echo "--- Checking: https://store.shopware.com/en/swag136939272659f/shopware-6-security-plugin.html ---"
          php monitor.php "https://store.shopware.com/en/swag136939272659f/shopware-6-security-plugin.html"

      - name: Commit updated hashes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cache/
          git diff --staged --quiet || git commit -m "chore: update URL hashes"
          git push
